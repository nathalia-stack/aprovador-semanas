<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F3EF;
      --surface: #FFFFFF;
      --ink: #1A1A18;
      --ink-light: #6B6B65;
      --border: #E0DDD7;
      --radius: 12px;
    }

    body { 
      font-family: 'DM Sans', sans-serif; 
      background: var(--bg); 
      color: var(--ink); 
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    /* TOPBAR — tipo o aprovador */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245, 243, 239, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .topbar-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .topbar-brand {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--ink-light);
      text-transform: uppercase;
    }

    .topbar-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--ink);
    }

    .topbar-subtitle {
      font-size: 0.75rem;
      color: var(--ink-light);
      letter-spacing: 0.04em;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    #posts-container {
      display: flex;
      flex-direction: column;
      gap: 48px;
      margin-bottom: 60px;
    }

    .post-card {
      background: var(--surface);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 40px rgba(0,0,0,0.06);
      border: 1.5px solid var(--border);
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp { 
      from { opacity: 0; transform: translateY(16px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    .carousel-image-container {
      position: relative;
      background: #F0EEE9;
      aspect-ratio: 4 / 5;
      overflow: hidden;
    }

    .carousel-image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: absolute;
      top: 0; left: 0;
    }

    .carousel-image-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      top: 0; left: 0;
    }

    .nav-button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(26, 26, 24, 0.5);
      border: none;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 10;
    }

    .nav-button:hover {
      background: rgba(26, 26, 24, 0.7);
    }

    .nav-button.prev {
      left: 12px;
    }

    .nav-button.next {
      right: 12px;
    }

    .indicators {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }

    .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .indicator.active {
      background: rgba(255, 255, 255, 0.9);
    }

    .week-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(26, 26, 24, 0.75);
      color: white;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 99px;
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    .carousel-body {
      padding: 24px 28px;
    }

    .legenda {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--ink);
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .descricao {
      font-size: 0.85rem;
      color: var(--ink-light);
      line-height: 1.6;
      margin-bottom: 16px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .counter {
      font-size: 0.78rem;
      color: var(--ink-light);
      background: var(--bg);
      padding: 4px 12px;
      border-radius: var(--radius);
      display: inline-block;
      margin-bottom: 20px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .comments-section {
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    .comments-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 12px;
      display: block;
    }

    .comments-textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--ink);
      background: var(--bg);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    .comments-textarea:focus {
      border-color: var(--ink);
    }

    .comments-textarea::placeholder {
      color: var(--ink-light);
    }

    @media (max-width: 600px) {
      body { padding: 20px 16px; }
      .header { margin-bottom: 32px; }
      .header h1 { font-size: 1.4rem; }
    }
  </style>
</head>

  function getFileId(url) {
    const match = url.match(/id=([^&]+)/);
    return match ? match[1] : null;
  }

  function isVideo(url) {
    const id = getFileId(url);
    return id && videoIds.has(id);
  }

  function getThumbUrl(url) {
    const id = getFileId(url);
    // lh3.googleusercontent.com/d/ID é o CDN nativo do Google Drive, sem CORS
    return `https://lh3.googleusercontent.com/d/${id}`;
  }

  function getEmbedUrl(url) {
    const id = getFileId(url);
    return `https://drive.google.com/file/d/${id}/preview`;
  }

  // Estado dos carrosséis
  const carouselStates = {};

  // Inicializar
  function init() {
    const container = document.getElementById('posts-container');
    
    posts.forEach((post, idx) => {
      carouselStates[idx] = 0;
      container.appendChild(createPostCard(post, idx));
    });
  }

  // Criar elemento de mídia (imagem ou vídeo)
  function createMediaElement(url, postIdx) {
    if (isVideo(url)) {
      const iframe = document.createElement('iframe');
      iframe.src = getEmbedUrl(url);
      iframe.style.cssText = 'width:100%;height:100%;border:none;position:absolute;top:0;left:0;';
      iframe.allow = 'autoplay';
      iframe.allowFullscreen = true;
      return iframe;
    } else {
      const img = document.createElement('img');
      img.src = getThumbUrl(url);
      img.alt = `Post ${postIdx + 1}`;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
      return img;
    }
  }

  // Criar card de post com carrossel
  function createPostCard(post, postIdx) {
    const card = document.createElement('div');
    card.className = 'post-card';
    
    const imageCount = post.imagens.length;
    const isCarousel = imageCount > 1;

    // Container da mídia
    const mediaContainer = document.createElement('div');
    mediaContainer.className = 'carousel-image-container';
    mediaContainer.style.position = 'relative';

    // Elemento de mídia inicial
    const mediaEl = createMediaElement(post.imagens[0], postIdx);
    mediaEl.id = `media-${postIdx}`;
    mediaContainer.appendChild(mediaEl);

    // Badge de semana
    const badge = document.createElement('span');
    badge.className = 'week-badge';
    badge.textContent = `Semana ${post.week}`;
    mediaContainer.appendChild(badge);

    if (isCarousel) {
      const prevBtn = document.createElement('button');
      prevBtn.className = 'nav-button prev';
      prevBtn.innerHTML = '‹';
      prevBtn.onclick = () => prevImage(postIdx);
      mediaContainer.appendChild(prevBtn);

      const nextBtn = document.createElement('button');
      nextBtn.className = 'nav-button next';
      nextBtn.innerHTML = '›';
      nextBtn.onclick = () => nextImage(postIdx);
      mediaContainer.appendChild(nextBtn);

      const indicators = document.createElement('div');
      indicators.className = 'indicators';
      indicators.id = `indicators-${postIdx}`;
      post.imagens.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.className = 'indicator' + (i === 0 ? ' active' : '');
        dot.onclick = () => goToImage(postIdx, i);

        if (isVideo(post.imagens[i])) {
          dot.style.background = i === 0 ? 'rgba(255,200,50,0.9)' : 'rgba(255,200,50,0.4)';
        }
        indicators.appendChild(dot);
      });
      mediaContainer.appendChild(indicators);
    }

    card.appendChild(mediaContainer);

    // Body
    const body = document.createElement('div');
    body.className = 'carousel-body';
    body.innerHTML = `
      <div class="legenda">${post.legenda}</div>
      <div class="descricao">${post.descricao}</div>
      ${isCarousel ? `<div class="counter"><span>${imageCount} artes</span></div>` : ''}
      <div class="comments-section">
        <label class="comments-label">Anotações</label>
        <textarea class="comments-textarea" id="comments-${postIdx}" placeholder="Deixe seus comentários ou feedback..."></textarea>
      </div>
    `;
    card.appendChild(body);

    return card;
  }

  // Navegação de imagens
  function nextImage(postIdx) {
    const post = posts[postIdx];
    carouselStates[postIdx] = (carouselStates[postIdx] + 1) % post.imagens.length;
    updateCarousel(postIdx);
  }

  function prevImage(postIdx) {
    const post = posts[postIdx];
    carouselStates[postIdx] = (carouselStates[postIdx] - 1 + post.imagens.length) % post.imagens.length;
    updateCarousel(postIdx);
  }

  function goToImage(postIdx, imgIdx) {
    carouselStates[postIdx] = imgIdx;
    updateCarousel(postIdx);
  }

  function updateCarousel(postIdx) {
    const post = posts[postIdx];
    const currentIdx = carouselStates[postIdx];
    const url = post.imagens[currentIdx];
    const container = document.getElementById(`media-${postIdx}`).parentNode;

    // Remove old media element
    const old = document.getElementById(`media-${postIdx}`);
    if (old) old.remove();

    // Create new media element
    const newMedia = createMediaElement(url, postIdx);
    newMedia.id = `media-${postIdx}`;

    // Insert before the badge (first child)
    container.insertBefore(newMedia, container.firstChild);

    // Update indicators
    const indicators = document.querySelectorAll(`#indicators-${postIdx} .indicator`);
    indicators.forEach((ind, i) => {
      ind.classList.toggle('active', i === currentIdx);
      if (isVideo(post.imagens[i])) {
        ind.style.background = i === currentIdx ? 'rgba(255,200,50,0.9)' : 'rgba(255,200,50,0.4)';
      } else {
        ind.style.background = '';
      }
    });
  }

  // Inicializar ao carregar
  init();
</script>

</body>
</html>
